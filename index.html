<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puntada Maestra</title>
    <!-- LOGO DE LA PESTAÑA -->
    <link rel="icon" type="image/png" href="img/icono.png">
    <!-- LINK PARA LA FUENTE DE LA CABECERA -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">

    <!-- Definimos variables CSS -->
     <style>
        :root {
            /* Paleta de Colores */
            --color-primario: #83bdf7;       /* Azul principal */
            --color-secundario: #b38ffa;     /* Morado claro secundario */
            --color-acento: #f59e0b;         /* Naranja para resaltar */
            --color-texto: #000000;           /* Blanco para lectura */
            --color-fondo: #ffffff;          /* Blanco de fondo */

            /* Fuentes */
            --fuente-principal: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --tamano-h1: 2rem;
            --tamano-cuerpo: 1rem;

            /* Espaciados y Bordes */
            --espacio-pequeno: 8px;
            --espacio-medio: 16px;
            --espacio-grande: 32px;
            --radio-borde: 12px;
            
            /* Sombras para dar profundidad de "App" */
            --sombra-suave: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    
        body {
            font-family: var(--fuente-principal);
            color: var(--color-texto);
            background-color: var(--color-fondo);
            margin: 0;
            line-height: 1.6;
        }

        header {
            /* Ruta de tu imagen */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('img/telas.jpg');
            background-size: cover;       /* Ajusta la imagen al ancho y alto */
            background-position: center;  /* Centra la foto */
            height: 200px;                /* Altura del banner */
            display: flex;
            align-items: center;
            justify-content: center;
            color: whitesmoke;                 /* Texto blanco sobre la imagen */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        section {
            background-color: var(--color-primario);
            margin: var(--espacio-medio);
            padding: var(--espacio-grande);
            border-radius: var(--radio-borde);
            box-shadow: var(--sombra-suave);
        }

        aside {
            background-color: var(--color-secundario);
            margin: var(--espacio-medio);
            padding: var(--espacio-grande);
            border-radius: var(--radio-borde);
            box-shadow: var(--sombra-suave);
        }

        footer {
            background-color: var(--color-fondo);
            margin: var(--espacio-medio);
            padding: var(--espacio-grande);
            border-radius: var(--radio-borde);
            box-shadow: var(--sombra-suave);
        }

        h1 {
            font-family: 'Playfair Display', serif; font-style: italic; /* Cambia aquí según tu elección */
            font-size: 4rem;
            color: whitesmoke;
            margin-bottom: 0.2em; /* Espacio elegante con el subtítulo */
            line-height: 1.1;     /* Ajusta el salto de línea interno */
            text-align: center;
        }


        /*Maquetar la lista de tareas*/
        :root {
            /* Añadimos colores para los badges */
            --color-alta: #fef3c7;
            --texto-alta: #991b1b;
            --color-media: #fef3c7;
            --texto-media: #92400e;
            --color-baja: #fef3c7;
            --texto-baja: #12941A;
        }

        .lista-tareas {
            list-style: none;
            padding: 0;
        }

        .tarea-item {
            display: flex; /* Activa Flexbox */
            justify-content: space-between; /* Título a la izquierda, Badge a la derecha */
            align-items: center; /* Alineación vertical perfecta */
            padding: var(--espacio-medio);
            background: var(--color-fondo);
            border-radius: var(--radio-borde);
            margin-bottom: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .tarea-item:hover {
            background-color: #f8fafc;
            transform: translateY(-2px);
            box-shadow: var(--sombra-suave);
        }

        .btn-progreso {
            background-color: var(--texto-media);
            color: var(--color-texto);
            border: none;
            padding: 4px 12px;
            border-radius: 20px; /* Esto lo hace redondeado (píldora) */
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-finalizado {
            background-color: var(--texto-baja);
            color: var(--color-texto);
            border: none;
            padding: 4px 12px;
            border-radius: 20px; /* Esto lo hace redondeado (píldora) */
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-eliminar {
            background-color: var(--texto-alta);
            color: var(--color-texto);
            border: none;
            padding: 4px 12px;
            border-radius: 20px; /* Esto lo hace redondeado (píldora) */
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-progreso:hover {
            background-color: var(--texto-media);
        } 
        .btn-finalizado:hover {
            background-color: var(--texto-baja);
        } 
        .btn-eliminar:hover {
            background-color: var(--texto-alta);
        }

        .buscador-container {
            width: 100%;                    
            margin-bottom: 20px;
            display: flex;
   
        }

        #inputBusqueda {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 20px;
            border: 2px solid #eee;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        #inputBusqueda:focus {
            border-color: var(--color-acento);
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
        }

        /* Alineación de Checkbox + Texto */
        .tarea-check {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tarea-check input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .tarea-info {
            display: flex;
            flex-direction: column; /* Apila título y categoría uno sobre otro */
            gap: 4px; /* Espacio pequeño entre ellos */
        }

        .tarea-titulo {
            display: block;
            font-weight: 600;
            color: var(--color-texto);
            cursor: pointer;
        }

        .tarea-categoria {
            font-size: 0.85rem;
            color: #64748b;
        }

        /* Estilo de los Badges */
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge-alta { background: var(--color-alta); color: var(--texto-alta); }
        .badge-media { background: var(--color-media); color: var(--texto-media); }
        .badge-baja { background: var(--color-baja); color: var(--texto-baja); }

        /* Estructura para pantallas pequeñas (móvil) */
        .contenedor-app {
            display: flex;
            flex-direction: column; /* Apilados uno debajo del otro */
        }

        /* Estructura base para pantallas grandes (Escritorio) */
        .contenedor-app {
            display: flex;
            flex-direction: row; /* Uno al lado del otro */
            gap: var(--espacio-pequeno);
        }

        aside {
            flex: 1; /* Ocupa un ancho fijo o proporcional */
            min-width: 250px;
        }
        #listaResumen {
            min-height: 50px;
            display: block !important;
        }

        main {
            flex: 3; /* Ocupa el resto del espacio */
        }

        /* --- MEDIA QUERY PARA MÓVILES --- */
        @media (max-width: 768px) {
            .contenedor-app {
                display:flex;
                flex-direction: column; /* Apila la barra lateral debajo del contenido */
                box-sizing: border-box;
            }

            aside {
                min-width: unset;
                box-sizing: border-box;
            }
            
            .tarea-item {
                flex-direction: column; /* Las tareas también se apilan si son muy anchas */
                align-items: flex-start;
            }
        }
    </style>

</head>
<body>

    <header>
        <h1>Puntada Maestra</h1> 
    </header>

    <div class="contenedor-app", style="display: flex;">
        <main>
            <section id="inicio">
                <div class="cabecera-seccion">
                    <h2>Mis Tareas</h2>
                    <span class="contador">Añadir tareas:</span>

                    <!-- Mi buscador -->
                    <div class="buscador-container">
                        <input type="text" id="inputBusqueda" placeholder="Buscar tarea...">
                    </div>
                </div>

                <!-- El formulario -->
                <form id="miFormulario">
                    <input type="text" id="inputTarea" placeholder="Escribe una tarea">
                    <input type="text" id="inputCategoria" placeholder="Descripción">

                    <!-- Desplegable de prioridad -->
                    <select id="prioridadTarea">
                        <option value="Baja">Baja</option>
                        <option value="Media">Media</option>
                        <option value="Alta">Alta</option>
                    </select>

                    <button type="submit">Agregar</button>
                </form>

                <ul id="listaTareas", class="lista-tareas"></ul>
                
            </section>
        </main>

        <aside style="border: 2px solid #ccc; min-height: 200px; padding: 10px;">
            <h2>Estado de las Tareas</h2>
            <ul id="listaResumen", class="lista-resumen", style="list-style: none; padding: 0;"></ul>
        </aside>
    </div>
    <footer>
        <p>&copy; 2024</p>
    </footer>
    <script src="app.js"></script>
</body>
</html>
