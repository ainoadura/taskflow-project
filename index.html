<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puntada Maestra</title>
    <!-- LOGO DE LA PESTAÑA -->
    <link rel="icon" type="image/png" href="img/icono.png">
    <!-- LINK PARA LA FUENTE DE LA CABECERA -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <!-- Definimos variables CSS en nuestro documento style.css -->
     <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Puntada Maestra</h1> 
    </header>

    <div class="contenedor-app", style="display: flex;">
        <main>
            <section id="inicio">
                <div class="cabecera-seccion">
                    <h2>Mis Tareas</h2>
                    <span class="contador">Añadir tareas:</span>

                    <!-- Mi buscador -->
                    <div class="buscador-container">
                        <input type="text" id="inputBusqueda" placeholder="Buscar tarea...">
                    </div>
                </div>

                <!-- El formulario -->
                <form id="miFormulario">
                    <input type="text" id="inputTarea" placeholder="Escribe una tarea">
                    <input type="text" id="inputCategoria" placeholder="Descripción">

                    <!-- Desplegable de prioridad -->
                    <select id="prioridadTarea">
                        <option value="Baja">Baja</option>
                        <option value="Media">Media</option>
                        <option value="Alta">Alta</option>
                    </select>

                    <button type="submit">Agregar</button>
                </form>

                <ul id="listaTareas", class="lista-tareas"></ul>
                
            </section>
        </main>

        <aside style="border: 2px solid #ccc; min-height: 200px; padding: 10px;">
            <h2>Estado de las Tareas</h2>
            <ul id="listaResumen", class="lista-resumen", style="list-style: none; padding: 0;"></ul>
        </aside>
    </div>
    <footer>
        <p>&copy; 2024</p>
    </footer>
    <script src="app.js"></script>    
</body>
</html>
